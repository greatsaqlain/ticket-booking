<!DOCTYPE html>
<html>
<head>
<title>Payment</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#000000,#1a1a2e,#16213e);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.container{
background:#111;
padding:30px;
border-radius:12px;
width:400px;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

h2{
margin-bottom:20px;
}

.select{
margin-bottom:15px;
}

input,select{
width:100%;
padding:12px;
border:none;
margin-top:5px;
border-radius:6px;
}

.summary{
background:#1a1a2e;
padding:15px;
border-radius:8px;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
background:#00c853;
border:none;
color:white;
cursor:pointer;
border-radius:6px;
margin-top:10px;
}

button:hover{
background:#00a844;
}

.success{
display:none;
margin-top:15px;
background:#003300;
padding:15px;
border-radius:8px;
}
</style>

</head>

<body>

<div class="container">

<h2>Payment</h2>

<div class="summary">
<p>Movie: <span id="movie"></span></p>
<p>Seats: <span id="seats"></span></p>
<p>Total: ₹<span id="total"></span></p>
</div>

<div class="select">
<label>Payment Method</label>
<select id="method">
<option>UPI</option>
<option>Credit Card</option>
<option>Debit Card</option>
<option>Net Banking</option>
</select>
</div>

<div class="select">
<label>Enter Details</label>
<input id="details" placeholder="Enter UPI / Card number">
</div>

<button onclick="pay()">Pay Now</button>

<button onclick="download()">Download Ticket</button>

<div class="success" id="success"></div>

</div>

<script>

if(localStorage.getItem("login")!="true"){
window.location="login.html"
}

document.getElementById("movie").innerText=localStorage.getItem("movie")
document.getElementById("seats").innerText=localStorage.getItem("seats")
document.getElementById("total").innerText=localStorage.getItem("total")

function pay(){

if(details.value==""){
alert("Enter payment details")
return
}

document.getElementById("success").style.display="block"
document.getElementById("success").innerHTML=
"Payment Successful <br><br>"+
"Your ticket is confirmed"

localStorage.setItem("paid","true")
}

function download(){

if(localStorage.getItem("paid")!="true"){
alert("Complete payment first")
return
}

var content=
"MOVIE TICKET\n\n"+
"Movie: "+localStorage.getItem("movie")+"\n"+
"Seats: "+localStorage.getItem("seats")+"\n"+
"Total: ₹"+localStorage.getItem("total")+"\n"+
"Status: Paid"

var blob=new Blob([content],{type:"text/plain"})
var a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="ticket.txt"
a.click()

}

</script>

</body>
</html>
