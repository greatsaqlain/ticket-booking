<!DOCTYPE html>
<html>
<head>
<title>Payment</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
}

.box{
width:400px;
margin:40px auto;
background:white;
padding:20px;
box-shadow:0 0 10px gray;
}

input,select,button{
width:100%;
padding:8px;
margin-top:10px;
}

#ticket{
display:none;
background:#e7ffe7;
padding:10px;
margin-top:10px;
}
</style>

</head>

<body>

<div class="box">

<h2>Payment</h2>

<p>Total Amount: ₹<span id="amount"></span></p>

<label>Payment Method</label>
<select id="method">
<option>UPI</option>
<option>Credit Card</option>
<option>Debit Card</option>
<option>Net Banking</option>
</select>

<label>Card / UPI Number</label>
<input type="text" id="number">

<button onclick="pay()">Pay Now</button>
<button onclick="download()">Download Ticket</button>

<div id="ticket"></div>

</div>

<script>

var data=JSON.parse(localStorage.getItem("booking"));

if(!data){
window.location="booking.html";
}

document.getElementById("amount").innerText=data.total;

function pay(){

var num=document.getElementById("number").value;

if(num==""){
alert("Enter payment details");
return;
}

localStorage.setItem("paid","true");

document.getElementById("ticket").style.display="block";

document.getElementById("ticket").innerHTML=
"<h3>Payment Successful</h3>"+
"Name: "+data.name+"<br>"+
"Movie: "+data.movie+"<br>"+
"Seats: "+data.seats+"<br>"+
"Date: "+data.date+"<br>"+
"Total Paid: ₹"+data.total;

}

function download(){

if(localStorage.getItem("paid")!="true"){
alert("Complete payment first");
return;
}

var content=
"ONLINE MOVIE TICKET\n\n"+
"Name: "+data.name+"\n"+
"Movie: "+data.movie+"\n"+
"Seats: "+data.seats+"\n"+
"Date: "+data.date+"\n"+
"Total: ₹"+data.total+"\n"+
"Status: PAID";

var blob=new Blob([content],{type:"text/plain"});
var a=document.createElement("a");

a.href=URL.createObjectURL(blob);
a.download="movie_ticket.txt";
a.click();
}

</script>

</body>
</html>
