<!DOCTYPE html>
<html>
<head>
<title>Movie Ticket Booking</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
background:linear-gradient(135deg,#000000,#1a1a2e,#16213e);
display:flex;
justify-content:center;
align-items:center;
}

.container{
display:flex;
width:800px;
height:450px;
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 20px 40px rgba(0,0,0,0.5);
}

/* left side */
.left{
flex:1;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:40px;
}

.left h1{
font-size:32px;
margin-bottom:10px;
}

.left p{
opacity:0.8;
}

/* right side */
.right{
flex:1;
padding:40px;
display:flex;
flex-direction:column;
justify-content:center;
}

.right h2{
margin-bottom:20px;
}

.input{
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
outline:none;
transition:0.3s;
}

input:focus{
border-color:#2c5364;
box-shadow:0 0 5px rgba(44,83,100,0.5);
}

button{
padding:12px;
border:none;
background:#2c5364;
color:white;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#1b3a4b;
}

.footer{
margin-top:10px;
font-size:12px;
color:gray;
}
</style>

</head>

<body>

<div class="container">

<div class="left">
<h1>Welcome Back</h1>
<p>Book your movie tickets online</p>
</div>

<div class="right">
<h2>Login</h2>

<div class="input">
<input id="user" placeholder="Username">
</div>

<div class="input">
<input id="pass" type="password" placeholder="Password">
</div>

<button onclick="login()">Login</button>

<p class="footer">Demo login : admin / 1234</p>

</div>

</div>

<script>
function login(){

var u=document.getElementById("user").value
var p=document.getElementById("pass").value

if(u=="admin" && p=="1234"){
localStorage.setItem("login","true")
window.location="booking.html"
}else{
alert("Invalid login")
}

}
</script>

</body>
</html>
