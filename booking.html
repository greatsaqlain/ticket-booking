<!DOCTYPE html>
<html>
<head>
<title>Movie Booking</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

.nav{
background:#000;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
width:800px;
margin:auto;
padding:20px;
}

.screen{
background:white;
height:100px;
margin:20px 0;
transform:rotateX(-45deg);
box-shadow:0 10px 20px rgba(255,255,255,0.5);
}

.seats{
display:grid;
grid-template-columns:repeat(8,1fr);
gap:10px;
}

.seat{
background:#444;
padding:15px;
text-align:center;
cursor:pointer;
border-radius:5px;
}

.seat:hover{
background:#666;
}

.selected{
background:#00c853 !important;
}

.booked{
background:red;
cursor:not-allowed;
}

.summary{
margin-top:20px;
background:#222;
padding:15px;
border-radius:10px;
}

button{
padding:10px;
background:#00c853;
border:none;
color:white;
cursor:pointer;
margin-top:10px;
width:100%;
}
</style>

</head>

<body>

<div class="nav">
<h2>Movie Ticket Booking</h2>
<button onclick="logout()">Logout</button>
</div>

<div class="container">

<h3>Select Movie</h3>
<select id="movie">
<option>Avengers</option>
<option>Batman</option>
<option>Interstellar</option>
<option>Spiderman</option>
</select>

<div class="screen"></div>

<h3>Select Seats</h3>

<div class="seats" id="seats"></div>

<div class="summary">
<p>Seats: <span id="count">0</span></p>
<p>Total: ₹<span id="total">0</span></p>

<button onclick="payment()">Proceed to Payment</button>
</div>

</div>

<script>

if(localStorage.getItem("login")!="true"){
window.location="login.html"
}

const seatContainer=document.getElementById("seats")
let total=0
let count=0
let selected=[]

for(let i=1;i<=40;i++){
let seat=document.createElement("div")
seat.classList.add("seat")
seat.innerText=i

seat.addEventListener("click",()=>{

if(seat.classList.contains("selected")){
seat.classList.remove("selected")
count--
total-=150
selected=selected.filter(s=>s!=i)
}else{
seat.classList.add("selected")
count++
total+=150
selected.push(i)
}

document.getElementById("count").innerText=count
document.getElementById("total").innerText=total

})

seatContainer.appendChild(seat)
}

function payment(){

if(selected.length==0){
alert("Select seats")
return
}

localStorage.setItem("seats",selected)
localStorage.setItem("total",total)
localStorage.setItem("movie",movie.value)

window.location="payment.html"
}

function logout(){
localStorage.removeItem("login")
window.location="login.html"
}

</script>

</body>
</html>
