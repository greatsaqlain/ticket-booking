<!DOCTYPE html>
<html>
<head>
<title>Movie Booking</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.nav{
background:#020617;
padding:15px;
display:flex;
justify-content:space-between;
}

.container{
width:900px;
margin:auto;
padding:20px;
}

.screen{
background:white;
height:120px;
margin:20px 0;
transform:rotateX(-45deg);
box-shadow:0 10px 20px rgba(255,255,255,0.5);
}

.seats{
display:grid;
grid-template-columns:repeat(10,1fr);
gap:8px;
}

.seat{
background:#1e293b;
padding:12px;
text-align:center;
cursor:pointer;
border-radius:6px;
}

.seat:hover{
background:#334155;
}

.selected{
background:#22c55e !important;
}

.summary{
margin-top:20px;
background:#020617;
padding:15px;
border-radius:10px;
}

button{
padding:12px;
background:#22c55e;
border:none;
color:white;
cursor:pointer;
width:100%;
margin-top:10px;
}
</style>
</head>

<body>

<div class="nav">
<h2>Movie Ticket Booking</h2>
<button onclick="logout()">Logout</button>
</div>

<div class="container">

<h3>Select Movie</h3>
<select id="movie">
<option>Avengers</option>
<option>Batman</option>
<option>Interstellar</option>
<option>Spiderman</option>
</select>

<div class="screen"></div>

<h3>Select Seats</h3>
<div class="seats" id="seats"></div>

<div class="summary">
<p>Seats: <span id="count">0</span></p>
<p>Total: ₹<span id="total">0</span></p>

<button onclick="payment()">Proceed to Payment</button>
</div>

</div>

<script>

const seatContainer=document.getElementById("seats")
let total=0
let count=0
let selected=[]

for(let i=1;i<=50;i++){
let seat=document.createElement("div")
seat.classList.add("seat")
seat.innerText=i

seat.onclick=function(){

seat.classList.toggle("selected")

if(selected.includes(i)){
selected=selected.filter(s=>s!=i)
count--
total-=150
}else{
selected.push(i)
count++
total+=150
}

document.getElementById("count").innerText=count
document.getElementById("total").innerText=total

}

seatContainer.appendChild(seat)
}

function payment(){
localStorage.setItem("seats",selected)
localStorage.setItem("total",total)
localStorage.setItem("movie",movie.value)
window.location="payment.html"
}

function logout(){
window.location="index.html"
}

</script>

</body>
</html>
